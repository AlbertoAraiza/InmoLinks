<div class="auth-container d-flex align-items-center justify-content-center vh-100 bg-light p-3">
    <mat-card class="auth-card shadow-lg border-0 rounded-4 w-100" style="max-width: 450px;">
        <mat-card-header class="justify-content-center pt-4 pb-0">
            <div class="text-center">
                <img src="logo-inmolinks.png" height="56" alt="InmoLinks Pro" class="mb-3">
                <mat-card-title class="fw-bold fs-3">Bienvenido</mat-card-title>
                <mat-card-subtitle>Inicia sesión para gestionar tus propiedades</mat-card-subtitle>
            </div>
        </mat-card-header>

        <mat-card-content class="p-4 p-md-5">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <!-- Email -->
                <mat-form-field appearance="outline" class="w-100 mb-2">
                    <mat-label>Correo Electrónico</mat-label>
                    <input matInput type="email" formControlName="email" placeholder="email@ejemplo.com" autocomplete="email">
                    <mat-icon matSuffix>email</mat-icon>
                </mat-form-field>

                <!-- Password -->
                <mat-form-field appearance="outline" class="w-100 mb-1">
                    <mat-label>Contraseña</mat-label>
                    <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password">
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                </mat-form-field>

                <div class="text-end mb-4">
                    <a routerLink="/forgot-password" class="text-primary text-decoration-none small fw-bold">¿Olvidaste tu contraseña?</a>
                </div>

                <button mat-flat-button color="primary" type="submit" 
                        class="w-100 py-4 fs-6 rounded-pill shadow-sm" 
                        [disabled]="loginForm.invalid || isLoading">
                    <span *ngIf="!isLoading">INICIAR SESIÓN</span>
                    <mat-spinner diameter="24" color="accent" *ngIf="isLoading"></mat-spinner>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted">¿No tienes cuenta? 
                    <a routerLink="/register" class="text-primary text-decoration-none fw-bold">Regístrate aquí</a>
                </p>
            </div>
        </mat-card-content>
    </mat-card>
</div>
